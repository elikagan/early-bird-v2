<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Early Bird — Account (Buyer)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans: ['"JetBrains Mono"', 'monospace'],
          mono: ['"JetBrains Mono"', 'monospace'],
          serif: ['"JetBrains Mono"', 'monospace'],
        },
      },
    }
  </script>
  <style>
    html, body { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  </style>
</head>
<body class="min-h-screen bg-base-300">
  <div class="max-w-md mx-auto min-h-screen bg-base-100 flex flex-col">

    <!-- Header -->
    <header class="px-4 pt-6 pb-3 border-b border-base-300">
      <div class="flex items-center justify-between">
        <a href="home-buyer.html" class="text-lg font-bold tracking-tight">EARLY BIRD</a>
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content w-8 rounded-full">
            <span class="text-xs font-bold">JC</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Profile -->
    <section class="px-4 pt-6 pb-4">
      <div class="flex items-center gap-4">
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content w-16 rounded-full">
            <span class="text-xl font-bold">JC</span>
          </div>
        </div>
        <div class="flex-1">
          <div class="font-bold text-lg">John Chen</div>
          <div class="text-xs text-base-content/60">(213) 555-0134</div>
        </div>
        <!-- Subtle pill-with-pencil edit affordance (cross-screen pattern, mirrored on account-dealer). -->
        <!-- Supersedes the earlier T9 input-ghost invisible-field treatment, which was not discoverable. -->
        <button class="btn btn-ghost btn-xs rounded-full gap-1 text-base-content/60">Edit ✎</button>
      </div>
    </section>

    <!-- Stats -->
    <section class="px-4 pb-4">
      <div class="stats stats-horizontal bg-base-200 w-full">
        <div class="stat p-3">
          <div class="stat-title text-[10px] uppercase tracking-wider">Watching</div>
          <div class="stat-value text-xl">7</div>
        </div>
        <div class="stat p-3">
          <div class="stat-title text-[10px] uppercase tracking-wider">Inquiries</div>
          <div class="stat-value text-xl">12</div>
        </div>
        <div class="stat p-3">
          <div class="stat-title text-[10px] uppercase tracking-wider">Bought</div>
          <div class="stat-value text-xl">5</div>
        </div>
      </div>
    </section>

    <div class="divider mx-4 my-0"></div>

    <!-- Notifications -->
    <section class="px-4 py-5">
      <div class="text-xs uppercase tracking-widest text-base-content/60 mb-3">Notifications</div>

      <div class="form-control">
        <label class="label cursor-pointer justify-between p-0 py-3 gap-4 border-b border-base-300">
          <div class="flex-1">
            <div class="text-sm font-bold">Drop Alerts</div>
            <div class="text-xs text-base-content/60 leading-tight mt-0.5">Text me when markets I follow go live</div>
          </div>
          <input type="checkbox" checked class="toggle" />
        </label>
      </div>

      <div class="form-control">
        <label class="label cursor-pointer justify-between p-0 py-3 gap-4 border-b border-base-300">
          <div class="flex-1">
            <div class="text-sm font-bold">Price Drops</div>
            <div class="text-xs text-base-content/60 leading-tight mt-0.5">Text me when watched items drop in price</div>
          </div>
          <input type="checkbox" checked class="toggle" />
        </label>
      </div>

      <div class="form-control">
        <label class="label cursor-pointer justify-between p-0 py-3 gap-4">
          <div class="flex-1">
            <div class="text-sm font-bold">New Markets</div>
            <div class="text-xs text-base-content/60 leading-tight mt-0.5">Text me when new LA markets are added</div>
          </div>
          <input type="checkbox" class="toggle" />
        </label>
      </div>
    </section>

    <div class="divider mx-4 my-0"></div>

    <!-- Following -->
    <!-- Pills are follow toggles. Solid neutral = following, ghost/dimmed = not following. -->
    <!-- Full list of LA markets shown (bounded ~4 total); user taps a pill to toggle. -->
    <section class="px-4 py-5">
      <div class="text-xs uppercase tracking-widest text-base-content/60 mb-3">Markets You Follow</div>
      <div class="flex flex-wrap gap-2">
        <button class="badge badge-neutral px-3 py-3">Downtown Modernism</button>
        <button class="badge badge-neutral px-3 py-3">Rose Bowl Flea</button>
        <button class="badge badge-neutral px-3 py-3">PCC Flea</button>
        <button class="badge badge-ghost px-3 py-3">Melrose Trading Post</button>
      </div>
    </section>

    <div class="divider mx-4 my-0"></div>

    <!-- Become A Seller -->
    <!-- OQ3: exact dealer-apply flow (one-tap toggle vs. application + review) still not resolved. -->
    <!-- Copy updated per user direction in the 13.6 pass — conversational voice, inline "Learn more" link -->
    <!-- replaces the previous card+button treatment which read as a marketing interstitial on this page. -->
    <section class="px-4 py-5">
      <div class="text-xs uppercase tracking-widest text-base-content/60 mb-3">Become A Seller</div>
      <div class="text-sm leading-relaxed">Are you selling at an upcoming market and wanna post here for free? <a href="#" class="link font-bold">Learn more →</a></div>
    </section>

    <div class="divider mx-4 my-0"></div>

    <!-- Footer: settings-row pattern mirrors the Notifications section above (label left, affordance right) -->
    <!-- so the footer reads as a proper screen section instead of a loose link stack. Sign Out is outline, -->
    <!-- not fill-red — destructive fill-red clashes with T2 color-down; the intended behavior is a confirm -->
    <!-- step on tap (no JS in Phase 1; Phase 4 polish will wire the confirm). Version line uses the same -->
    <!-- text-xs text-base-content/60 primitive as the profile phone number, not an arbitrary text-[10px]/40. -->
    <section class="px-4 py-5 pb-8">
      <div class="text-xs uppercase tracking-widest text-base-content/60 mb-3">More</div>

      <a class="flex items-center justify-between py-3 border-b border-base-300">
        <div class="text-sm font-bold">Help &amp; Support</div>
        <div class="text-sm text-base-content/40">›</div>
      </a>

      <a class="flex items-center justify-between py-3 border-b border-base-300">
        <div class="text-sm font-bold">Privacy Policy</div>
        <div class="text-sm text-base-content/40">›</div>
      </a>

      <a class="flex items-center justify-between py-3 border-b border-base-300">
        <div class="text-sm font-bold">Terms</div>
        <div class="text-sm text-base-content/40">›</div>
      </a>

      <button class="btn btn-sm btn-outline w-full mt-6">Sign Out</button>

      <div class="text-xs text-base-content/60 text-center mt-4">Early Bird v1.0 · LA</div>
    </section>

    <!-- Spacer for bottom nav -->
    <div class="h-16"></div>

    <!-- Bottom nav (buyer: 3 tabs) -->
    <nav class="max-w-md mx-auto fixed bottom-0 left-0 right-0 bg-base-200 flex">
      <a class="flex-1 flex flex-col items-center py-3 text-base-content/60">
        <span class="text-[10px] uppercase tracking-widest">Buy</span>
      </a>
      <a class="flex-1 flex flex-col items-center py-3 text-base-content/60">
        <span class="text-[10px] uppercase tracking-widest">Watching (7)</span>
      </a>
      <div class="w-px bg-base-300 my-2"></div>
      <a class="flex-1 flex flex-col items-center py-3 text-base-content font-bold border-t-2 border-neutral">
        <span class="text-[10px] uppercase tracking-widest">Account</span>
      </a>
    </nav>

  </div>
</body>
</html>
