# Pings /api/cron/drop-markets on a schedule so upcoming markets flip
# to live at their drop_at and followers get the SMS blast.
#
# Vercel Hobby only allows daily crons, so we host the cron here on
# GitHub Actions instead (free, minute-level scheduling).
#
# Note: GitHub's scheduler has a real-world lag of 5-15 minutes even
# when the cron expression is tight. That's acceptable for drop timing
# (buyers won't notice a few minutes) and can be tightened by upgrading
# Vercel to Pro and moving the schedule back into vercel.json.
#
# Secret required: CRON_SECRET (same value as in Vercel env). Set via
# the GitHub UI: Settings → Secrets and variables → Actions → New.

name: Drop Markets Cron

on:
  schedule:
    # Every 5 minutes. GitHub may round up to ~5-15 min lag.
    - cron: "*/5 * * * *"
  # Allow manual trigger from the Actions tab for ad-hoc testing.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping drop-markets endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it via Settings → Secrets → Actions."
            exit 1
          fi
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://earlybird.la/api/cron/drop-markets)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::Non-200 response"
            exit 1
          fi
