<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Early Bird — Buy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans: ['"JetBrains Mono"', 'monospace'],
          mono: ['"JetBrains Mono"', 'monospace'],
          serif: ['"JetBrains Mono"', 'monospace'],
        },
      },
    }
  </script>
  <style>
    html, body { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  </style>
</head>
<body class="min-h-screen bg-base-300">
  <div class="max-w-md mx-auto min-h-screen bg-base-100 flex flex-col">

    <!-- Header -->
    <header class="px-4 pt-6 pb-3 border-b border-base-300">
      <div class="flex items-center justify-between mb-3">
        <a href="home-buyer.html" class="text-lg font-bold tracking-tight">EARLY BIRD</a>
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content w-8 rounded-full">
            <span class="text-xs font-bold">JC</span>
          </div>
        </div>
      </div>

      <!-- Market context — plain div, not a button. Market switching is owned by home-buyer (the lobby), not in-feed. Same kill that landed for sell-booth-active in b5ad706. -->
      <div class="flex items-center justify-between gap-2">
        <div>
          <div class="text-sm font-bold">Downtown Modernism</div>
          <div class="text-[10px] uppercase tracking-widest text-base-content/60">Sat Apr 26</div>
        </div>
        <div class="badge badge-success gap-1">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-success-content"></span>
          LIVE
        </div>
      </div>
      <div class="text-[10px] uppercase tracking-widest text-base-content/60 mt-2">127 buyers shopping now</div>
    </header>

    <!-- Items grid -->
    <main class="flex-1 px-4 py-4 pb-24">
      <div class="grid grid-cols-2 gap-3">

        <!-- Item 1 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-walnut-credenza/600/600" alt="Walnut Credenza" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">MF</span>
                </div>
              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2">Walnut Credenza</div>
            <div class="font-bold text-sm">$450</div>
            <button class="btn btn-xs btn-neutral mt-1">Interested</button>
          </div>
        </div>

        <!-- Item 2 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-brass-desk-lamp/600/600" alt="Brass Desk Lamp" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 left-2">
              <div class="badge badge-warning badge-sm font-bold">HELD</div>
            </div>
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♥</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">DG</span>
                </div>
              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2">Brass Desk Lamp</div>
            <div class="font-bold text-sm">$180</div>
            <button class="btn btn-xs btn-neutral mt-1">Interested</button>
          </div>
        </div>

        <!-- Item 3 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-leather-armchair/600/600" alt="Vintage Leather Armchair" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">AB</span>

          </div>
        </div>

        <!-- Item 4 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden opacity-60">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-enamel-kitchen-table/600/600" alt="Enamel Kitchen Table" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 left-2">
              <div class="badge badge-neutral badge-sm font-bold">SOLD</div>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">RH</span>
                </div>
              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2 line-through">Enamel Kitchen Table</div>
            <div class="font-bold text-sm line-through">$140</div>
            <button class="btn btn-xs btn-disabled mt-1">Sold</button>
          </div>
        </div>

        <!-- Item 5 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-cobalt-studio-vase/600/600" alt="Cobalt Studio Vase" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">

                  <span class="text-xs font-bold">LK</span>

              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2">Cobalt Studio Vase</div>

          </div>
        </div>

        <!-- Item 6 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-teak-nesting-tables/600/600" alt="Teak Nesting Tables" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">MF</span>

              </div>

        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-chrome-floor-lamp/600/600" alt="Chrome Floor Lamp" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">

                  <span class="text-xs font-bold">DG</span>
                </div>
              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2">Chrome Floor Lamp</div>
            <div class="font-bold text-sm">$275</div>
            <button class="btn btn-xs btn-neutral mt-1">Interested</button>
          </div>
        </div>

        <!-- Item 8 -->
        <div class="card card-compact bg-base-100 border border-base-300 overflow-hidden">
          <figure class="aspect-square bg-base-200 relative">
            <img src="https://picsum.photos/seed/eb-signed-woodcut-print/600/600" alt="Signed Woodcut Print" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute top-2 right-2">
              <button class="btn btn-circle btn-xs btn-ghost bg-base-100/90">♡</button>
            </div>
            <div class="absolute bottom-2 left-2">
              <div class="avatar placeholder">
                <div class="bg-neutral text-neutral-content w-10 rounded-full ring-2 ring-base-100">
                  <span class="text-xs font-bold">AB</span>
                </div>
              </div>
            </div>
          </figure>
          <div class="card-body">
            <div class="text-xs font-bold leading-tight line-clamp-2">Signed Woodcut Print</div>
            <div class="font-bold text-sm">$95</div>
            <button class="btn btn-xs btn-neutral mt-1">Interested</button>
          </div>
        </div>

      </div>
    </main>

    <!-- Bottom nav -->
    <nav class="max-w-md mx-auto fixed bottom-0 left-0 right-0 bg-base-200 flex">
      <a class="flex-1 flex flex-col items-center py-3 text-base-content font-bold border-t-2 border-neutral">
        <span class="text-[10px] uppercase tracking-widest">Buy</span>
      </a>
      <a class="flex-1 flex flex-col items-center py-3 text-base-content/60">
        <span class="text-[10px] uppercase tracking-widest">Watching (7)</span>
      </a>
      <div class="w-px bg-base-300 my-2"></div>
      <a class="flex-1 flex flex-col items-center py-3 text-base-content/60">
        <span class="text-[10px] uppercase tracking-widest">Account</span>
      </a>
    </nav>

  </div>
</body>
</html>
